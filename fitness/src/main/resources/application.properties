spring.application.name=fitness
# H2 Database Configuration
# spring.datasource.url=jdbc:h2:mem:fitnessdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=update

# H2 Console (optional - for viewing database)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# For Codespaces, you might need to set the server address
server.address=0.0.0.0
server.forward-headers-strategy=native


# PostgreSQL Configuration
# When running under Docker Compose the postgres service is reachable as `postgres` hostname
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/fitnessdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fitness}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fitness123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable security for development (optional)
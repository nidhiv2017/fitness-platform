version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: fitness-postgres
    environment:
      POSTGRES_DB: fitnessdb
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./fitness
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitnessdb
      SPRING_DATASOURCE_USERNAME: fitness
      SPRING_DATASOURCE_PASSWORD: fitness123
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_BACKEND_URL: http://backend:8080
    ports:
      - "5173:80"
    environment:
      VITE_BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data: